name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  DOCKER_COMPOSE_FILE: docker-compose.raspberry-pi.yml

jobs:
  # Job de vérification des secrets avant déploiement
  check-secrets:
    name: Verify Required Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Check required secrets
        run: |
          MISSING_SECRETS=()
          
          if [ -z "${{ secrets.RASPBERRY_PI_SSH_KEY }}" ]; then
            MISSING_SECRETS+=("RASPBERRY_PI_SSH_KEY")
          fi
          
          if [ -z "${{ secrets.RASPBERRY_PI_HOST }}" ]; then
            MISSING_SECRETS+=("RASPBERRY_PI_HOST")
          fi
          
          if [ -z "${{ secrets.RASPBERRY_PI_USER }}" ]; then
            MISSING_SECRETS+=("RASPBERRY_PI_USER")
          fi
          
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            MISSING_SECRETS+=("DB_PASSWORD")
          fi
          
          if [ -z "${{ secrets.GRAFANA_PASSWORD }}" ]; then
            MISSING_SECRETS+=("GRAFANA_PASSWORD")
          fi
          
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            MISSING_SECRETS+=("JWT_SECRET")
          fi
          
          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "❌ Les secrets suivants sont manquants:"
            printf '   - %s\n' "${MISSING_SECRETS[@]}"
            echo ""
            echo "📚 Pour configurer les secrets:"
            echo "   1. Allez dans Settings → Secrets and variables → Actions"
            echo "   2. Cliquez sur 'New repository secret'"
            echo "   3. Ajoutez chaque secret manquant"
            exit 1
          fi
          
          echo "✅ Tous les secrets obligatoires sont configurés!"

  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: check-secrets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RASPBERRY_PI_SSH_KEY }}

      - name: Add Raspberry Pi to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.RASPBERRY_PI_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh ${{ secrets.RASPBERRY_PI_USER }}@${{ secrets.RASPBERRY_PI_HOST }} 'echo "✓ SSH connection successful"'

      - name: Create deployment package
        run: |
          tar -czf deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*/bin' \
            --exclude='*/obj' \
            --exclude='*.log' \
            .

      - name: Transfer files to Raspberry Pi
        run: |
          scp deploy.tar.gz ${{ secrets.RASPBERRY_PI_USER }}@${{ secrets.RASPBERRY_PI_HOST }}:/tmp/

      - name: Deploy on Raspberry Pi
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
        run: |
          ssh ${{ secrets.RASPBERRY_PI_USER }}@${{ secrets.RASPBERRY_PI_HOST }} << 'ENDSSH'
            set -e
            
            echo "🍓 Detecting Raspberry Pi architecture..."
            ARCH=$(uname -m)
            echo "   Architecture detected: $ARCH"
            
            case "$ARCH" in
              aarch64|arm64)
                echo "   ✅ ARM64 (Raspberry Pi 4, 5, 400, CM4)"
                DOCKER_PLATFORM="linux/arm64"
                ;;
              armv7l)
                echo "   ✅ ARMv7 (Raspberry Pi 2, 3, 3B+)"
                DOCKER_PLATFORM="linux/arm/v7"
                ;;
              armv6l)
                echo "   ✅ ARMv6 (Raspberry Pi 1, Zero, Zero W)"
                DOCKER_PLATFORM="linux/arm/v6"
                echo "   ⚠️  Warning: SQL Server nécessite ARM64. Utilisez PostgreSQL ou MariaDB à la place."
                ;;
              *)
                echo "   ❌ Architecture non supportée: $ARCH"
                exit 1
                ;;
            esac
            
            export DOCKER_DEFAULT_PLATFORM=$DOCKER_PLATFORM
            echo "   Platform configured: $DOCKER_PLATFORM"
            
            echo "📦 Extracting deployment package..."
            cd /home/${{ secrets.RASPBERRY_PI_USER }}/eLibrary || mkdir -p /home/${{ secrets.RASPBERRY_PI_USER }}/eLibrary && cd /home/${{ secrets.RASPBERRY_PI_USER }}/eLibrary
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz
            
            echo "🔧 Creating .env file..."
            cat > .env << 'EOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GOOGLE_BOOKS_API_KEY=${{ secrets.GOOGLE_BOOKS_API_KEY }}
          REDIS_CONNECTION_STRING=redis:6379
          RABBITMQ_HOST=rabbitmq
          RABBITMQ_USER=guest
          RABBITMQ_PASS=guest
          JWT_ISSUER=eLibrary-API
          JWT_AUDIENCE=eLibrary-Clients
          JWT_EXPIRATION_MINUTES=60
          ENABLE_RECOMMENDATIONS=true
          ENABLE_REAL_TIME_NOTIFICATIONS=true
          ENABLE_GOOGLE_BOOKS_ENRICHMENT=true
          ENABLE_ADVANCED_ANALYTICS=false
          EOF
            
            echo "🐳 Building Docker images..."
            echo "   Platform: $DOCKER_PLATFORM"
            DOCKER_DEFAULT_PLATFORM=$DOCKER_PLATFORM docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} build --parallel
            
            echo "🚀 Deploying application..."
            DOCKER_DEFAULT_PLATFORM=$DOCKER_PLATFORM docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} up -d
            
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            echo "✅ Deployment completed successfully!"
            
            echo "📊 Container status:"
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} ps
          ENDSSH

      - name: Health check
        run: |
          sleep 30  # Wait for services to start
          
          echo "🏥 Checking service health..."
          
          # Check if services are responding
          GATEWAY_URL="http://${{ secrets.RASPBERRY_PI_HOST }}:5000/health"
          
          for i in {1..10}; do
            if curl -f -s "$GATEWAY_URL" > /dev/null; then
              echo "✅ Gateway is healthy!"
              break
            else
              echo "⏳ Waiting for gateway... (attempt $i/10)"
              sleep 10
            fi
            
            if [ $i -eq 10 ]; then
              echo "❌ Health check failed after 10 attempts"
              exit 1
            fi
          done

      - name: Send deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ SUCCESS"
            COLOR="good"
          else
            STATUS="❌ FAILED"
            COLOR="danger"
          fi
          
          echo "$STATUS - Deployment to Raspberry Pi completed"
          
          # Vous pouvez ajouter ici une notification Slack/Discord/Email si nécessaire

      - name: Cleanup
        if: always()
        run: |
          rm -f deploy.tar.gz

  # Job optionnel : Rollback en cas d'échec
  rollback:
    name: Rollback on failure
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RASPBERRY_PI_SSH_KEY }}

      - name: Add Raspberry Pi to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.RASPBERRY_PI_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback to previous version
        run: |
          ssh ${{ secrets.RASPBERRY_PI_USER }}@${{ secrets.RASPBERRY_PI_HOST }} << 'ENDSSH'
            cd /home/${{ secrets.RASPBERRY_PI_USER }}/eLibrary
            
            echo "🔄 Rolling back to previous version..."
            git checkout HEAD~1
            
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} up -d
            
            echo "✅ Rollback completed"
          ENDSSH

