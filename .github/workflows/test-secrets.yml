name: Test GitHub Secrets

on:
  workflow_dispatch:
  push:
    branches:
      - test/github-secrets-validation

jobs:
  test-secrets:
    name: Test Secrets Recovery
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test all required secrets
        run: |
          echo "🔍 Testing GitHub Secrets..."
          echo ""
          
          # Function to check secret
          check_secret() {
            local SECRET_NAME=$1
            local SECRET_VALUE=$2
            
            if [ -z "$SECRET_VALUE" ]; then
              echo "❌ $SECRET_NAME: NOT CONFIGURED"
              return 1
            else
              echo "✅ $SECRET_NAME: CONFIGURED (${#SECRET_VALUE} characters)"
              return 0
            fi
          }
          
          ERRORS=0
          
          # Test each secret
          check_secret "RASPBERRY_PI_SSH_KEY" "${{ secrets.RASPBERRY_PI_SSH_KEY }}" || ERRORS=$((ERRORS+1))
          check_secret "RASPBERRY_PI_HOST" "${{ secrets.RASPBERRY_PI_HOST }}" || ERRORS=$((ERRORS+1))
          check_secret "RASPBERRY_PI_USER" "${{ secrets.RASPBERRY_PI_USER }}" || ERRORS=$((ERRORS+1))
          check_secret "DB_PASSWORD" "${{ secrets.DB_PASSWORD }}" || ERRORS=$((ERRORS+1))
          check_secret "GRAFANA_PASSWORD" "${{ secrets.GRAFANA_PASSWORD }}" || ERRORS=$((ERRORS+1))
          check_secret "JWT_SECRET" "${{ secrets.JWT_SECRET }}" || ERRORS=$((ERRORS+1))
          check_secret "GOOGLE_BOOKS_API_KEY (optional)" "${{ secrets.GOOGLE_BOOKS_API_KEY }}" || true
          
          echo ""
          echo "📊 Summary:"
          echo "   Required secrets: 6"
          echo "   Optional secrets: 1"
          echo "   Errors: $ERRORS"
          
          if [ $ERRORS -eq 0 ]; then
            echo ""
            echo "🎉 All required secrets are configured!"
            echo "   Your Raspberry Pi deployment is ready to go!"
          else
            echo ""
            echo "❌ $ERRORS secret(s) missing!"
            echo ""
            echo "📚 To configure missing secrets:"
            echo "   1. Go to Settings → Secrets and variables → Actions"
            echo "   2. Click 'New repository secret'"
            echo "   3. Add each missing secret"
            exit 1
          fi

      - name: Validate SSH Key format
        run: |
          SSH_KEY="${{ secrets.RASPBERRY_PI_SSH_KEY }}"
          
          if [ -z "$SSH_KEY" ]; then
            echo "⏭️  Skipping SSH Key validation (not configured)"
            exit 0
          fi
          
          echo "🔑 Validating SSH Key format..."
          
          # Check if it starts with correct header
          if [[ "$SSH_KEY" == "-----BEGIN OPENSSH PRIVATE KEY-----"* ]]; then
            echo "✅ SSH Key has correct OpenSSH format"
          elif [[ "$SSH_KEY" == "-----BEGIN RSA PRIVATE KEY-----"* ]]; then
            echo "✅ SSH Key has correct RSA format"
          elif [[ "$SSH_KEY" == "-----BEGIN EC PRIVATE KEY-----"* ]]; then
            echo "✅ SSH Key has correct EC format"
          else
            echo "❌ SSH Key format is invalid!"
            echo "   Expected format: -----BEGIN ... PRIVATE KEY-----"
            exit 1
          fi
          
          # Check if it ends correctly
          if [[ "$SSH_KEY" == *"-----END"*"PRIVATE KEY-----"* ]]; then
            echo "✅ SSH Key has correct ending"
          else
            echo "⚠️  Warning: SSH Key might be truncated"
          fi

      - name: Validate JWT Secret strength
        run: |
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          
          if [ -z "$JWT_SECRET" ]; then
            echo "⏭️  Skipping JWT Secret validation (not configured)"
            exit 0
          fi
          
          echo "🔐 Validating JWT Secret strength..."
          
          JWT_LENGTH="${#JWT_SECRET}"
          
          if [ $JWT_LENGTH -lt 32 ]; then
            echo "⚠️  Warning: JWT_SECRET is too short ($JWT_LENGTH chars)"
            echo "   Recommended: at least 32 characters"
          elif [ $JWT_LENGTH -lt 64 ]; then
            echo "✅ JWT_SECRET has acceptable length ($JWT_LENGTH chars)"
          else
            echo "✅ JWT_SECRET has excellent length ($JWT_LENGTH chars)"
          fi

      - name: Test environment variables creation
        run: |
          echo "📋 Creating test .env file..."
          
          cat > .env.test << 'EOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GOOGLE_BOOKS_API_KEY=${{ secrets.GOOGLE_BOOKS_API_KEY }}
          REDIS_CONNECTION_STRING=redis:6379
          RABBITMQ_HOST=rabbitmq
          RABBITMQ_USER=guest
          RABBITMQ_PASS=guest
          JWT_ISSUER=eLibrary-API
          JWT_AUDIENCE=eLibrary-Clients
          JWT_EXPIRATION_MINUTES=60
          ENABLE_RECOMMENDATIONS=true
          ENABLE_REAL_TIME_NOTIFICATIONS=true
          ENABLE_GOOGLE_BOOKS_ENRICHMENT=true
          ENABLE_ADVANCED_ANALYTICS=false
          EOF
          
          echo "✅ Test .env file created"
          echo ""
          echo "📄 Content preview (secrets masked):"
          sed 's/=.*/=***/' .env.test | head -10
          
          # Verify file is not empty
          if [ -s .env.test ]; then
            echo ""
            echo "✅ Environment file is valid"
          else
            echo ""
            echo "❌ Environment file is empty!"
            exit 1
          fi
          
          rm .env.test

      - name: Test results summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════"
          echo "           TEST RESULTS SUMMARY"
          echo "═══════════════════════════════════════════"
          echo ""
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All tests passed!"
            echo ""
            echo "🚀 Your GitHub Secrets are correctly configured"
            echo "   You can now proceed with Raspberry Pi deployment"
            echo ""
            echo "Next steps:"
            echo "   1. Run the 'Deploy to Raspberry Pi' workflow"
            echo "   2. Or push to main/production branch for auto-deploy"
          else
            echo "❌ Some tests failed"
            echo ""
            echo "Please check the logs above and fix the issues"
            echo "Then run this workflow again"
          fi

